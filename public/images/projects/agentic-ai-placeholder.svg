<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#0f1628"/>
  <!-- Grid lines -->
  <g stroke="#1e2d4a" stroke-width="1" opacity="0.6">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>
  <!-- Central node -->
  <circle cx="400" cy="225" r="48" fill="#1e2d4a" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="400" cy="225" r="36" fill="#0f1628" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <!-- Satellite nodes -->
  <circle cx="220" cy="145" r="22" fill="#1e2d4a" stroke="#14b8a6" stroke-width="1.5"/>
  <circle cx="580" cy="145" r="22" fill="#1e2d4a" stroke="#14b8a6" stroke-width="1.5"/>
  <circle cx="180" cy="300" r="18" fill="#1e2d4a" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="620" cy="300" r="18" fill="#1e2d4a" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="400" cy="95" r="16" fill="#1e2d4a" stroke="#14b8a6" stroke-width="1.5"/>
  <circle cx="400" cy="355" r="16" fill="#1e2d4a" stroke="#14b8a6" stroke-width="1.5"/>
  <!-- Connection lines -->
  <g stroke="#3b82f6" stroke-width="1" opacity="0.5" stroke-dasharray="4 3">
    <line x1="352" y1="210" x2="242" y2="158"/>
    <line x1="448" y1="210" x2="558" y2="158"/>
    <line x1="370" y1="248" x2="198" y2="293"/>
    <line x1="430" y1="248" x2="602" y2="293"/>
    <line x1="400" y1="177" x2="400" y2="111"/>
    <line x1="400" y1="273" x2="400" y2="339"/>
  </g>
  <!-- Outer ring nodes -->
  <circle cx="100" cy="200" r="12" fill="#1e2d4a" stroke="#3b82f6" stroke-width="1"/>
  <circle cx="700" cy="200" r="12" fill="#1e2d4a" stroke="#3b82f6" stroke-width="1"/>
  <g stroke="#1e2d4a" stroke-width="1" opacity="0.4">
    <line x1="162" y1="300" x2="112" y2="208"/>
    <line x1="638" y1="300" x2="688" y2="208"/>
  </g>
  <!-- Pulse rings -->
  <circle cx="400" cy="225" r="64" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>
  <circle cx="400" cy="225" r="82" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.12"/>
  <!-- Label -->
  <text x="400" y="408" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#475569" letter-spacing="3">AGENTIC AI · PRODUCT PIPELINE</text>
</svg>
